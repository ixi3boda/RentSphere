services:
  mysql:
    image: mysql:8.0
    container_name: rentsphere-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: RentSphereSchema
      MYSQL_USER: rentsphere
      MYSQL_PASSWORD: rentsphere123
      MYSQL_ROOT_PASSWORD: rootpassword123
    command: #make db log all queries into terminal
      - sh
      - -c
      - >
          echo "MySQL is ready at jdbc:mysql://mysql:3306/RentSphereSchema";
          echo "Follow live DB output with: docker compose logs -f mysql";
          exec docker-entrypoint.sh mysqld --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --general-log=1 --general-log-file=/proc/1/fd/1
    volumes:
      - mysql_data:/var/lib/mysql
      - ./Database/Schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -urentsphere -prentsphere123 --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    image: rentsphere-backend
    container_name: rentsphere-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/RentSphereSchema?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: rentsphere
      SPRING_DATASOURCE_PASSWORD: rentsphere123
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    image: rentsphere-frontend
    container_name: rentsphere-frontend
    ports:
      - "3000:3000"
    environment:
      # Tells the React proxy to route API calls to the backend container
      - BACKEND_URL=http://backend:8080
    depends_on:
      - backend
    # Needed for hot-reloading if you map volumes (optional)
    # volumes:
    #   - ./Frontend/src:/app/src

volumes:
  mysql_data: